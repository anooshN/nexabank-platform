server:
  port: 8083

spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:nexabank_transactions}
    username: ${DB_USER:nexabank}
    password: ${DB_PASSWORD:nexabank123}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        linger.ms: 5
        batch.size: 65536
        compression.type: none

jwt:
  secret: ${JWT_SECRET:nexabank-super-secret-key-for-jwt-signing-must-be-256-bits-long}

services:
  account-service:
    url: http://${ACCOUNT_SERVICE_HOST:localhost}:8082
  ai-service:
    url: http://${AI_SERVICE_HOST:localhost}:8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nexabank: DEBUG
    org.springframework.kafka: INFO
